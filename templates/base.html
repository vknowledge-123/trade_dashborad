<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title else "Trade Dashboard" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
/* ─── Design Tokens ─────────────────────────────────────── */
:root {
  --bg:            #0a0f1c;
  --bg-2:          #0f1726;
  --surface:       rgba(12, 18, 32, 0.7);
  --surface-solid: #0c1220;
  --glass:         rgba(255, 255, 255, 0.04);
  --glass-hover:   rgba(255, 255, 255, 0.07);
  --border:        rgba(255, 255, 255, 0.07);
  --border-glow:   rgba(99, 210, 255, 0.25);

  --text:   #e8f0fe;
  --muted:  #6b7fa3;
  --dim:    #3d4f6e;

  --cyan:   #00d4ff;
  --cyan-2: #00a8d4;
  --green:  #00e5a0;
  --red:    #ff4d6d;
  --amber:  #ffb830;
  --purple: #a855f7;
  --indigo: #6366f1;

  --positive: #00e5a0;
  --negative: #ff4d6d;
  --neutral:  #6366f1;
  --primary:  #00d4ff;
  --accent:   #ffb830;

  --radius-sm: 10px;
  --radius:    16px;
  --radius-lg: 22px;
  --radius-xl: 28px;

  --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
  --shadow:    0 8px 32px rgba(0,0,0,0.55);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
  --glow-cyan: 0 0 40px rgba(0, 212, 255, 0.18);
  --glow-green: 0 0 40px rgba(0, 229, 160, 0.15);
}

/* ─── Reset ──────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ─── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border-glow);
  border-radius: 99px;
}

/* ─── Body & Background ──────────────────────────────────── */
html, body { margin: 0; padding: 0; }
body {
  padding-top: 0 !important;

  font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(120% 120% at 0% 0%, rgba(21, 38, 75, 0.915), rgba(4, 29, 37, 0.616) 85%, var(--bg) 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Animated mesh gradient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(0, 212, 255, 0.14) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 15%, rgba(99, 102, 241, 0.14) 0%, transparent 50%),
    radial-gradient(ellipse 60% 70% at 5% 80%, rgba(168, 85, 247, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse 90% 40% at 80% 90%, rgba(0, 229, 160, 0.10) 0%, transparent 50%);
  animation: bgPulse 14s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

/* Subtle grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(99, 210, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99, 210, 255, 0.025) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

@keyframes bgPulse {
  0%   { opacity: 1; }
  50%  { opacity: 0.7; }
  100% { opacity: 1; }
}

/* Floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
  animation: drift 18s ease-in-out infinite alternate;
}
.orb-1 {
  width: 500px; height: 500px;
  top: -180px; right: -120px;
  background: radial-gradient(circle, rgba(0,212,255,0.10) 0%, transparent 70%);
}
.orb-2 {
  width: 420px; height: 420px;
  bottom: -160px; left: -140px;
  background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%);
  animation-delay: -7s;
}
.orb-3 {
  width: 300px; height: 300px;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
  animation-delay: -3s;
}

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, 20px) scale(1.04); }
}

/* ─── Noise texture ──────────────────────────────────────── */
.noise {
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  mix-blend-mode: overlay;
  z-index: 1;
}

/* ─── Topbar ─────────────────────────────────────────────── */
.topbar {
  margin-top: 0 !important;
  border-top: 0 !important;

  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 8px clamp(12px, 3vw, 32px);
  height: 70px;
  background:
    linear-gradient(180deg, rgba(6, 10, 20, 0.95), rgba(6, 10, 20, 0.78)),
    radial-gradient(120% 80% at 20% 0%, rgba(0, 212, 255, 0.16), transparent 60%);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  border-bottom: 1px solid rgba(99, 210, 255, 0.16);
  box-shadow: 0 1px 0 rgba(99, 210, 255, 0.10), 0 14px 36px rgba(0,0,0,0.45);
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.04);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
}

.brand-mark {
  position: relative;
  width: 36px;
  height: 36px;
  border-radius: 11px;
  background: linear-gradient(135deg, #00d4ff 0%, #6366f1 60%, #a855f7 100%);
  box-shadow: 0 4px 16px rgba(0,212,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  font-family: 'Syne', sans-serif;
  letter-spacing: -1px;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
}

.brand-name {
  font-family: "Times New Roman", Times, serif;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.3px;
  background: linear-gradient(90deg, #e8f0fe, #00d4ff, #e8f0fe);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: brandShine 4s linear infinite;
}

.brand-tag {
  font-size: 10px;
  color: #a9bddb;
  letter-spacing: 0.3px;
  margin-top: 2px;
}

@keyframes brandShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* Nav */
.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px;
  border-radius: 99px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}

.nav-user {
  font-size: 13px;
  color: var(--text);
  padding: 0 8px;
  font-weight: 600;
  letter-spacing: 0.1px;
}

.nav-link {
  font-size: 12.5px;
  font-weight: 600;
  color: #e8f0fe;
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(8, 12, 24, 0.7);
  transition: all 0.2s ease;
  letter-spacing: 0.2px;
}

.nav-link:hover {
  border-color: rgba(99, 210, 255, 0.35);
  background: rgba(0, 212, 255, 0.12);
  color: var(--cyan);
  transform: translateY(-1px);
}

.nav-cta {
  background: linear-gradient(135deg, #00d4ff 0%, #6366f1 100%);
  color: #fff !important;
  border: none !important;
  font-weight: 700;
  box-shadow: 0 8px 26px rgba(0, 212, 255, 0.35);
}

.nav-cta:hover {
  box-shadow: 0 12px 34px rgba(0, 212, 255, 0.55);
  transform: translateY(-2px) !important;
  color: #fff !important;
}

/* ─── Page Wrapper ───────────────────────────────────────── */
.page {
  position: relative;
  z-index: 2;
  min-height: calc(100vh - 62px);
  padding: 6px clamp(16px, 3.5vw, 48px) 24px;
}

/* ─── Buttons ────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 26px;
  border-radius: 99px;
  border: 1px solid transparent;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.1px;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(.4,0,.2,1);
}

.btn-primary {
  background: linear-gradient(135deg, #00d4ff 0%, #6366f1 100%);
  color: #fff;
  box-shadow: 0 6px 24px rgba(0, 212, 255, 0.38);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0, 212, 255, 0.50);
}

.btn-ghost {
  border-color: var(--border);
  background: var(--glass);
  color: var(--text);
  backdrop-filter: blur(10px);
}
.btn-ghost:hover {
  border-color: var(--border-glow);
  background: var(--glass-hover);
  transform: translateY(-2px);
}

/* ─── Glass Panel / Card ─────────────────────────────────── */
.panel {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  overflow: hidden;
}

/* Top shine sweep line */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(99,210,255,0.55), transparent);
  transition: left 0s;
  opacity: 0;
}
.panel:hover::before {
  animation: panelShine 0.6s ease forwards;
  opacity: 1;
}
@keyframes panelShine {
  0%   { left: -60%; }
  100% { left: 140%; }
}

.panel:hover {
  transform: translateY(-2px);
  border-color: rgba(99, 210, 255, 0.22);
  box-shadow: var(--shadow-lg), var(--glow-cyan);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.panel-header h3 {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1px;
  color: var(--text);
  line-height: 1.2;
}

.panel-header h3,
.dash-hero h1,
.hero-copy h1 {
  background: linear-gradient(135deg, #ffffff, #9adfff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ─── Pills / Tags ───────────────────────────────────────── */
.pill {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 11px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--glass);
  letter-spacing: 0.3px;
}

.pill.positive {
  color: var(--positive);
  border-color: rgba(0, 229, 160, 0.25);
  background: rgba(0, 229, 160, 0.07);
}
.pill.negative {
  color: var(--negative);
  border-color: rgba(255, 77, 109, 0.25);
  background: rgba(255, 77, 109, 0.07);
}
.pill.neutral {
  color: var(--neutral);
  border-color: rgba(99, 102, 241, 0.25);
  background: rgba(99, 102, 241, 0.07);
}

/* ─── Table rows ─────────────────────────────────────────── */
.table { display: grid; gap: 3px; }

.table-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: var(--glass);
  font-size: 13px;
  border: 1px solid transparent;
  border-left: 2px solid transparent;
  transition: all 0.18s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}

/* Animated trade-graph sweep line on each row */
.table-row:not(.table-head)::after {
  display: none;
}

/* Gainers panel — green sweep */
.panel-gainers .table-row:not(.table-head)::after {
  background: linear-gradient(90deg, transparent, rgba(0,229,160,0.6), rgba(0,229,160,0.95));
}
.panel-gainers .table-row:not(.table-head):hover {
  border-left-color: transparent;
  background: var(--glass);
}

/* Losers panel — red sweep */
.panel-losers .table-row:not(.table-head)::after {
  background: linear-gradient(90deg, transparent, rgba(255,77,109,0.6), rgba(255,77,109,0.95));
}
.panel-losers .table-row:not(.table-head):hover {
  border-left-color: transparent;
  background: var(--glass);
}

.table-row:hover {
  background: var(--glass);
  border-color: transparent;
  transform: none;
}

@keyframes tradeBar {
  0%   { width: 0%;   opacity: 0; left: 0; }
  15%  { opacity: 0.8; }
  70%  { width: 100%; opacity: 0.7; }
  85%  { width: 100%; opacity: 0; }
  100% { width: 0%;   opacity: 0; left: 100%; }
}

.table-head {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--dim);
  background: transparent;
  border: none;
  border-left: 2px solid transparent;
  padding-bottom: 4px;
  padding-top: 2px;
}
.table-head:hover {
  background: transparent;
  border-color: transparent;

  transform: none;
}
.table-head::after { display: none; }

/* ─── FnO tag ────────────────────────────────────────────── */
.fno-tag {
  display: inline-block;
  margin-left: 5px;
  padding: 1px 6px;
  border-radius: 99px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid rgba(0, 153, 255, 0.45);
  color: #6cc7ff;
  background: rgba(0, 153, 255, 0.12);
  vertical-align: middle;
}

/* ─── Color utilities ────────────────────────────────────── */
.positive { color: var(--positive); }
.negative { color: var(--negative); }
.neutral  { color: var(--neutral); }
.muted    { color: var(--muted); }

/* ─── Sector rows ────────────────────────────────────────── */
.sector-grid { display: grid; gap: 5px; }

.sector-row {
  display: grid;
  grid-template-columns: 1.6fr 0.9fr 0.7fr;
  gap: 8px;
  align-items: center;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  border-left: 2px solid transparent;
  transition: all 0.18s ease;
}
.sector-row:not(.sector-head) {
  background: var(--glass);
  border-color: rgba(255,255,255,0.04);
}
.sector-row:not(.sector-head):hover {
  background: transparent;
  border-color: transparent;
}

.sector-head {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding-bottom: 4px;
}

.sector-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
.sector-price { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-align: left; }

.sector-bar {
  display: none;
}
.bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}
.bar-fill.positive {
  background: linear-gradient(90deg, rgba(0,229,160,0.3), rgba(0,229,160,0.9));
  box-shadow: 0 0 8px rgba(0,229,160,0.4);
}
.bar-fill.negative {
  background: linear-gradient(90deg, rgba(255,77,109,0.3), rgba(255,77,109,0.9));
  box-shadow: 0 0 8px rgba(255,77,109,0.4);
}
.bar-fill.neutral {
  background: linear-gradient(90deg, rgba(99,102,241,0.3), rgba(99,102,241,0.9));
}

.sector-change { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; text-align: right; }

/* ─── Dash hero ──────────────────────────────────────────── */
.dash-hero {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 6px;
  position: relative;
  min-height: 0;
}

.hero-left { display: none; }

.hero-divider {
  color: var(--dim);
  font-size: 14px;
  font-weight: 300;
  opacity: 0.5;
  margin: 0 2px;
}

.hero-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 4px 0;
  backdrop-filter: none;
  box-shadow: none;
}

/* Status dot */
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-dot.positive {
  background: var(--positive);
  box-shadow: 0 0 0 3px rgba(0,229,160,0.2), 0 0 10px rgba(0,229,160,0.5);
  animation: blink 2s ease-in-out infinite;
}
.status-dot.negative {
  background: var(--negative);
  box-shadow: 0 0 6px rgba(255,77,109,0.5);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

.status-line {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 500;
}

/* ─── Trial chip ─────────────────────────────────────────── */
.trial-chip {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 99px;
  white-space: nowrap;
}
.trial-chip.active {
  background: rgba(0,229,160,0.08);
  border: 1px solid rgba(0,229,160,0.30);
  color: var(--positive);
}
.trial-chip.expired {
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.30);
  color: var(--negative);
}

/* ─── Promo bar ──────────────────────────────────────────── */
.promo-bar {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin: 0 0 10px;
  padding: 10px 20px;
  border-radius: var(--radius);
  background: linear-gradient(135deg,
    rgba(0, 212, 255, 0.07) 0%,
    rgba(99, 102, 241, 0.10) 50%,
    rgba(168, 85, 247, 0.07) 100%);
  border: 1px solid rgba(99, 210, 255, 0.18);
  box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
}

/* Animated shimmer */
.promo-bar::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  animation: shimmer 4s linear infinite;
}

@keyframes shimmer {
  0%   { left: -60%; }
  100% { left: 140%; }
}

.promo-container {
  width: 100%;
  display: flex;
  justify-content: center;
}

.promo-content {
  text-align: center;
  max-width: 640px;
}

.promo-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.10);
  border: 1px solid rgba(0, 212, 255, 0.30);
  margin-bottom: 8px;
}

.promo-content h3 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 700;
  margin-bottom: 6px;
  background: linear-gradient(90deg, #e8f0fe, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.promo-note {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.promo-sub, .promo-cta-text {
  color: var(--dim);
  font-size: 12px;
  margin-top: 4px;
}

/* ─── Hero copy ──────────────────────────────────────────── */
.hero-copy {
  margin: 0 0 8px;
}
.hero-copy h2 {
  font-family: 'Inter', sans-serif;
  font-size: clamp(12px, 1.1vw, 14px);
  font-weight: 500;
  letter-spacing: 0;
  color: var(--muted);
  margin-bottom: 0;
}

/* ─── Dashboard 3-col grid ───────────────────────────────── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  align-items: start;
}

/* ─── Home hero ──────────────────────────────────────────── */
.hero {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 48px;
  align-items: center;
  padding: 24px 0;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--amber);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 2px;
  background: var(--amber);
  border-radius: 2px;
}

.hero-copy h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 800;
  line-height: 1.12;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #ffffff 30%, rgba(0,212,255,0.85) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.hero-stats {
  margin-top: 36px;
  display: flex;
  gap: 32px;
}
.stat-value {
  font-size: 26px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  background: linear-gradient(135deg, #fff, var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
}
.card-header {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.card-html, body { margin: 0; padding: 0; }
body {
  padding-top: 0 !important;
 display: grid; gap: 8px; }

.pulse-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--glass);
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: all 0.2s ease;
}
.pulse-row:hover { background: var(--glass-hover); }
.pulse-row.positive {
  border-left-color: var(--positive);
  background: rgba(0,229,160,0.05);
}
.pulse-row.negative {
  border-left-color: var(--negative);
  background: rgba(255,77,109,0.05);
}
.pulse-row.neutral {
  border-left-color: var(--neutral);
  background: rgba(99,102,241,0.05);
}

.card-footer {
  margin-top: 12px;
  font-size: 12px;
  color: var(--dim);
  text-align: center;
}

/* Feature grid */
.feature-grid {
  margin-top: 72px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.feature {
  padding: 24px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--glass);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  transition: all 0.25s ease;
}
.feature:hover {
  border-color: rgba(99,210,255,0.20);
  background: var(--glass-hover);
  transform: translateY(-3px);
  box-shadow: var(--glow-cyan), var(--shadow);
}
.feature::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.feature:hover::before { opacity: 1; }

.feature h3 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 8px;
  color: var(--text);
}
.feature p {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

/* ─── Auth ───────────────────────────────────────────────── */
.auth {
  display: grid;
  place-items: center;
  min-height: 75vh;
}

.auth-card {
  width: min(440px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px;
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
}

.auth-card h2 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(22px, 2.2vw, 28px);
  line-height: 1.15;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #ffffff 25%, #8ee6ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.2px;
  text-align: center;
}

.auth-card .muted {
  font-size: 13px;
  color: #7f95b8;
  line-height: 1.4;
  text-align: center;
}

.auth-form {
  display: grid;
  gap: 16px;
  margin-top: 8px;
}

.auth-form label {
  display: grid;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.auth-form input,
.auth-form textarea {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.auth-form input:focus,
.auth-form textarea:focus {
  border-color: rgba(0,212,255,0.45);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.10);
}

.auth-footer {
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}
.auth-footer a {
  color: var(--cyan);
  text-decoration: none;
  font-weight: 600;
}
.auth-footer a:hover { text-decoration: underline; }

/* ─── Alert / Error ──────────────────────────────────────── */
.alert {
  background: rgba(255, 77, 109, 0.08);
  border: 1px solid rgba(255, 77, 109, 0.30);
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  color: #ffa0b4;
  font-size: 13px;
  margin: 12px 0;
}

/* ─── Inquiry form ───────────────────────────────────────── */
.inquiry { display: grid; gap: 14px; }
.inquiry label {
  display: grid;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.inquiry input,
.inquiry textarea {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.inquiry input:focus,
.inquiry textarea:focus {
  border-color: rgba(0,212,255,0.45);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.10);
}

/* ─── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed;
  right: 24px;
  bottom: 28px;
  background: rgba(5, 8, 16, 0.95);
  color: var(--text);
  padding: 14px 20px;
  border-radius: var(--radius);
  border: 1px solid rgba(0,212,255,0.25);
  box-shadow: var(--shadow), 0 0 20px rgba(0,212,255,0.15);
  font-size: 13px;
  opacity: 0;
  transform: translateY(14px);
  transition: all 0.35s cubic-bezier(.4,0,.2,1);
  z-index: 999;
  backdrop-filter: blur(12px);
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* ─── Responsive ─────────────────────────────────────────── */
@media (max-width: 900px) {
  .page { padding: 10px clamp(12px, 4vw, 28px) 24px; }
  .topbar {
  margin-top: 0 !important;
  border-top: 0 !important;
 flex-direction: column; height: auto; padding: 12px 16px; gap: 10px; }
  .nav { flex-wrap: wrap; justify-content: center; }
  .dash-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .promo-bar { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 600px) {
  .page { padding: 6px 10px 18px; }
  .topbar {
  margin-top: 0 !important;
  border-top: 0 !important;
 padding: 10px 12px; }
  .brand { width: 100%; justify-content: center; }
  .brand-name { font-size: 17px; }
  .nav { width: 100%; justify-content: center; gap: 6px; padding: 6px; }
  .nav-link { padding: 7px 12px; font-size: 12px; }
  .hero-stats { flex-direction: column; gap: 16px; }
  .hero-actions { width: 100%; }
  .hero-actions .btn { width: 100%; }
  .dash-grid { grid-template-columns: 1fr; }
  .panel { padding: 12px; }
  .table-row { grid-template-columns: 1.2fr 0.9fr 0.9fr; font-size: 12px; }
  .sector-row { grid-template-columns: 1.6fr 0.9fr 0.7fr; }
  .hero-badge { border-radius: var(--radius); padding: 10px 12px; }
  .promo-strip { padding: 10px 12px; }
  .promo-strip-text { font-size: 12px; }
  .promo-strip-cta { width: 100%; text-align: center; }
  .auth-card { padding: 26px; }
  .auth-form input, .auth-form textarea { font-size: 13px; }
}

.inquiry-search,
.inquiry-filter {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
}
.inquiry-search:focus,
.inquiry-filter:focus {
  border-color: rgba(0,212,255,0.45);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.10);
}
  </style>
</head>
<body data-public="{{ 1 if public_mode is defined and public_mode else 0 }}">
  <div class="noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header class="topbar">
    <a class="brand" href="/">
      <div class="brand-mark">I</div>
      <div class="brand-text">
        <div class="brand-name">IoneAlgo Pro</div>
        <div class="brand-tag">Realtime sentiment. Sharp decisions.</div>
      </div>
    </a>

    <nav class="nav">
      {% if admin %}
        <span class="nav-user">Admin</span>
        <a class="nav-link" href="/admin">Admin Panel</a>
        <a class="nav-link" href="/admin/logout">Logout</a>
      {% elif user %}
        <span class="nav-user">Hi, {{ user["full_name"] }}</span>
        <a class="nav-link" href="/services">Services</a>
        <a class="nav-link" href="/inquiry">Inquiry</a>
        <a class="nav-link" href="/logout">Logout</a>
      {% else %}
        <a class="nav-link" href="/services">Services</a>
        <a class="nav-link" href="/inquiry">Inquiry</a>
        <a class="nav-link" href="/login">Login</a>
        <a class="nav-link nav-cta" href="/register">Register</a>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  if (params.get("inquiry") === "success") {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = "Inquiry sent. Our team will reach out soon.";
    document.body.appendChild(toast);

    setTimeout(() => toast.classList.add("show"), 50);
    setTimeout(() => toast.classList.remove("show"), 3500);
    setTimeout(() => toast.remove(), 4200);
  }

  const gainersBody = document.getElementById("gainers-body");
  const losersBody = document.getElementById("losers-body");
  const sectorGainers = document.getElementById("sector-gainers");
  const sectorLosers = document.getElementById("sector-losers");

  if (gainersBody && losersBody && sectorGainers && sectorLosers) {
    const ensureHead = (container) => {
      let head = container.querySelector(".table-head");
      if (!head) {
        head = document.createElement("div");
        head.className = "table-row table-head";
        head.innerHTML = "<span>Symbol</span><span>Price</span><span>Change %</span>";
      }
      return head;
    };

    const createRow = (row, positive, i) => {
      const el = document.createElement("div");
      el.className = "table-row";
      el.dataset.symbol = row.symbol;
      const sign = row.change > 0 ? "+" : "";
      const fno = row.is_fno ? '<span class="fno-tag">F&O</span>' : "";
      const delay = (i * (positive ? 0.18 : 0.22)).toFixed(2);
      el.style.setProperty("--row-delay", `${delay}s`);
      el.innerHTML = `
        <span class="cell-symbol">${row.symbol} ${fno}</span>
        <span class="cell-price">${row.price}</span>
        <span class="cell-change ${positive ? "positive" : "negative"}">${sign}${row.change}%</span>
      `;
      return el;
    };

    const updateTable = (container, rows, positive) => {
      const head = ensureHead(container);
      const existing = new Map(
        Array.from(container.querySelectorAll('.table-row[data-symbol]')).map((el) => [el.dataset.symbol, el])
      );
      const ordered = rows.map((row, i) => {
        const key = row.symbol;
        const sign = row.change > 0 ? "+" : "";
        const fno = row.is_fno ? '<span class="fno-tag">F&O</span>' : "";
        const delay = (i * (positive ? 0.18 : 0.22)).toFixed(2);
        let el = existing.get(key);
        if (!el) {
          el = createRow(row, positive, i);
        } else {
          el.style.setProperty("--row-delay", `${delay}s`);
          const symbolCell = el.querySelector('.cell-symbol');
          const priceCell = el.querySelector('.cell-price');
          const changeCell = el.querySelector('.cell-change');
          if (symbolCell) symbolCell.innerHTML = `${row.symbol} ${fno}`;
          if (priceCell) priceCell.textContent = row.price;
          if (changeCell) {
            changeCell.className = `cell-change ${positive ? "positive" : "negative"}`;
            changeCell.textContent = `${sign}${row.change}%`;
          }
        }
        return el;
      });
      container.innerHTML = "";
      container.appendChild(head);
      ordered.forEach((el) => container.appendChild(el));
    };

    const renderSectorRow = (row) => {
      const cls = row.change > 0 ? "positive" : row.change < 0 ? "negative" : "neutral";
      const sign = row.change > 0 ? "+" : "";
      const el = document.createElement("div");
      el.className = "sector-row";
      el.dataset.sector = row.sector;
      el.innerHTML = `
        <div class="sector-name">${row.sector}</div>
        <div class="sector-price">${row.price ?? "-"}</div>
        <div class="sector-change ${cls}">${sign}${row.change}%</div>
      `;
      return el;
    };

    const updateSectors = (container, rows, label) => {
      const head = document.createElement("div");
      head.className = "sector-row sector-head";
      head.innerHTML = `<div>${label}</div><div>Price</div><div>Change %</div>`;
      const existing = new Map(
        Array.from(container.querySelectorAll('.sector-row[data-sector]')).map((el) => [el.dataset.sector, el])
      );
      const ordered = rows.map((row) => {
        let el = existing.get(row.sector);
        if (!el) {
          el = renderSectorRow(row);
        } else {
          const cls = row.change > 0 ? "positive" : row.change < 0 ? "negative" : "neutral";
          const sign = row.change > 0 ? "+" : "";
          el.querySelector('.sector-price').textContent = row.price ?? "-";
          const changeEl = el.querySelector('.sector-change');
          changeEl.className = `sector-change ${cls}`;
          changeEl.textContent = `${sign}${row.change}%`;
        }
        return el;
      });
      container.innerHTML = "";
      container.appendChild(head);
      ordered.forEach((el) => container.appendChild(el));
    };

    // render cached snapshot immediately to avoid flicker on refresh
  const cached = localStorage.getItem("snapshot_cache");
  if (cached) {
    try {
      const data = JSON.parse(cached);
      updateTable(gainersBody, data.gainers || [], true);
      updateTable(losersBody, data.losers || [], false);
      updateSectors(sectorGainers, data.sector_gainers || [], "Top Gainers");
      updateSectors(sectorLosers, data.sector_losers || [], "Top Losers");
    } catch (e) {}
  }
  const updateSnapshot = async () => {
      try {
        const res = await fetch("/api/market-snapshot");
        if (!res.ok) return;
        const data = await res.json();
        updateTable(gainersBody, data.gainers || [], true);
        updateTable(losersBody, data.losers || [], false);
        updateSectors(sectorGainers, data.sector_gainers || [], "Top Gainers");
        updateSectors(sectorLosers, data.sector_losers || [], "Top Losers");
        try { localStorage.setItem("snapshot_cache", JSON.stringify(data)); } catch (e) {}
        if (data.market_open === false && intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      } catch (err) {
        // silent fail
      }
    };

    let intervalId = setInterval(updateSnapshot, 5000);
  }

  const isPublic = document.body.dataset.public === "1";
  if (isPublic) {
    setTimeout(() => {
      window.location.href = "/register";
    }, 120000);
  }
})();
  </script>
</body>
