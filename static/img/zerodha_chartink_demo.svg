    </g>
    <g>
      <line x1="615" y1="455" x2="615" y2="520" stroke="#00e5a0" stroke-width="2"/>
      <rect x="606" y="468" width="18" height="38" rx="4" fill="rgba(0,229,160,0.85)"/>
    </g>
    <g>
      <line x1="670" y1="420" x2="670" y2="490" stroke="#00e5a0" stroke-width="2"/>
      <rect x="661" y="434" width="18" height="40" rx="4" fill="rgba(0,229,160,0.85)"/>
    </g>
    <g>
      <line x1="725" y1="380" x2="725" y2="455" stroke="#ff4d6d" stroke-width="2"/>
      <rect x="716" y="396" width="18" height="42" rx="4" fill="rgba(255,77,109,0.80)"/>
    </g>
